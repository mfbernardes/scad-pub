<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="%APP_DESCRIPTION%" />
    <!-- theme-color, title and description are injected from the active config at
         build time (see the configHtml plugin in vite.config.ts). -->
    <meta name="theme-color" content="%APP_THEME_COLOR%" />
    <!-- Apply the saved/auto theme before first paint to avoid a flash. -->
    <script>
      (function () {
        try {
          var m = localStorage.getItem("scadpub.theme") || "auto";
          var dark =
            m === "dark" ||
            (m === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.dataset.theme = dark ? "dark" : "light";
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <title>%APP_TITLE%</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
