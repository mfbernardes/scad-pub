name: CI

# ScadPub is a standalone static site: this workflow builds the configured
# designs, runs the unit + headless end-to-end (smoke + axe) checks, and deploys
# to GitHub Pages on every push to main. Set the BASE_PATH repo variable to the
# subpath you serve it under ("/" for a domain root, "/scad-pub/" for
# <user>.github.io/scad-pub/).

on:
  # Only build/deploy on pushes to main. Feature branches are covered by the
  # pull_request event, so scoping push here avoids the duplicate "push" run
  # (and its skipped deploy job) that otherwise fires alongside every PR.
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # node:test globs + TS type-stripping for the unit tests
          cache: npm
      - run: npm ci

      - name: Unit tests
        run: npm test

      - name: Fetch pinned OpenSCAD WASM
        run: npm run wasm

      - name: Build
        run: npm run build
        env:
          # Override SCADPUB_CONFIG to build a different config.
          BASE_PATH: ${{ vars.BASE_PATH || '/' }}

      # Cache the Chromium download (~150 MB) keyed on the installed Playwright
      # version, so a browser is only downloaded when the dependency bumps.
      # Standard pattern: on a cache hit, skip the download but still install
      # the OS-level dependencies (apt packages aren't cacheable this way).
      - name: Read Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/playwright'].version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies (browser cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Smoke test (headless browser, incl. axe accessibility)
        run: npm run smoke

      - uses: actions/upload-artifact@v4
        with:
          name: scadpub-dist
          path: dist

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
