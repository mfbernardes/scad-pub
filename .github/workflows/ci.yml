name: CI

# ScadPub is a standalone static site: this workflow builds the configured
# designs, runs the unit + headless end-to-end (smoke + axe) checks plus a
# visual-regression check against tests/screenshots/, and deploys to GitHub
# Pages on every push to main. Set the BASE_PATH repo variable to the
# subpath you serve it under ("/" for a domain root, "/scad-pub/" for
# <user>.github.io/scad-pub/).

on:
  # Only build/deploy on pushes to main. Feature branches are covered by the
  # pull_request event, so scoping push here avoids the duplicate "push" run
  # (and its skipped deploy job) that otherwise fires alongside every PR.
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Default token permissions for every job in this workflow: read-only. The
# build job runs PR-controlled code (npm ci + the repo's own scripts), so it
# gets no write access to the repo/PR/packages by default. The deploy job
# below declares its own elevated `permissions:` block for the Pages API.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Production actions are pinned to reviewed commit SHAs (Dependabot bumps
      # the pins via the version comments). Do not replace a SHA with a mutable
      # major tag.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22 # node:test globs + TS type-stripping for the unit tests
          cache: npm
      - run: npm ci

      - name: Lint
        # See docs/architecture-review.md L2: the repo is triaged to 0 errors /
        # 0 warnings, so this gates on a hard zero rather than a ratcheted
        # warning budget.
        run: npx eslint . --max-warnings 0

      - name: Unit tests
        run: npm test

      - name: Fetch pinned OpenSCAD WASM
        run: npm run wasm

      - name: Build
        run: npm run build
        env:
          # Override SCADPUB_CONFIG to build a different config.
          BASE_PATH: ${{ vars.BASE_PATH || '/' }}

      # Cache the Chromium download (~150 MB) keyed on the installed Playwright
      # version, so a browser is only downloaded when the dependency bumps.
      # Standard pattern: on a cache hit, skip the download but still install
      # the OS-level dependencies (apt packages aren't cacheable this way).
      - name: Read Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/playwright'].version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies (browser cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Smoke test (headless browser, incl. axe accessibility)
        run: npm run smoke

      - name: Visual regression (light + dark chrome)
        id: vis
        run: npm run vis

      # Only when vis itself failed — not when an earlier step did (which would
      # skip vis, leaving no screenshots/ to upload).
      - name: Upload visual-regression diffs
        if: failure() && steps.vis.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scadpub-vis-diff
          path: screenshots/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scadpub-dist
          path: dist

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
