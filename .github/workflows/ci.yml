name: CI

# ScadPub is a standalone static site: this workflow builds the configured
# designs and runs the unit + headless end-to-end (smoke + axe) checks on every
# push to main and on every pull request. Deployment to GitHub Pages lives in a
# separate workflow (deploy.yml) that only runs on main, so it never appears as
# a check on PRs. Set the BASE_PATH repo variable to the subpath you serve it
# under ("/" for a domain root, "/scad-pub/" for <user>.github.io/scad-pub/).

on:
  # Build/test on pushes to main and on pull requests. Scoping push to main
  # avoids a duplicate "push" run firing alongside every PR.
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # node:test globs + TS type-stripping for the unit tests
          cache: npm
      - run: npm ci

      - name: Unit tests
        run: npm test

      - name: Fetch pinned OpenSCAD WASM
        run: npm run wasm

      - name: Build
        run: npm run build
        env:
          # Override SCADPUB_CONFIG to build a different config.
          BASE_PATH: ${{ vars.BASE_PATH || '/' }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Smoke test (headless browser, incl. axe accessibility)
        run: npm run smoke

      - uses: actions/upload-artifact@v4
        with:
          name: scadpub-dist
          path: dist
