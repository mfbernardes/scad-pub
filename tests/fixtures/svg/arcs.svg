<?xml version="1.0" encoding="UTF-8"?>
<!-- Corner case A5: a single filled path whose entire outline is stitched
     together from several elliptical-arc (A) commands, forming a rounded
     lumpy blob. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <path fill="black"
        d="M20,50
           A15,15 0 0 1 38,28
           A13,13 0 0 1 58,22
           A18,18 0 0 1 82,45
           A16,16 0 0 1 74,74
           A20,20 0 0 1 42,82
           A15,15 0 0 1 20,50
           Z"/>
</svg>
