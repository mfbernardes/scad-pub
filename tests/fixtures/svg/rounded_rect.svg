<?xml version="1.0" encoding="UTF-8"?>
<!-- Corner case A11: a filled rounded rectangle (rx/ry) plus one additional
     distinct filled shape with a clear gap between them. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect x="8" y="30" width="50" height="40" rx="10" ry="10" fill="black"/>
  <circle cx="80" cy="50" r="14" fill="black"/>
</svg>
