<?xml version="1.0" encoding="UTF-8"?>
<!-- Corner case B21: colour comes only from a <style> block's CSS class
     rules (.wall / .room), not inline fill= attributes, and is grouped
     under <g id="wall"> / <g id="room">. A colour-splitting checker that
     only reads inline fill attributes will miss the colour entirely and
     must fall back to resolving CSS class rules (or the group id). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .wall { fill: gray; }
    .room { fill: white; }
  </style>
  <g id="wall">
    <path class="wall" d="M0,0 L100,0 L100,100 L0,100 Z
                           M6,6 L6,94 L94,94 L94,6 Z"/>
  </g>
  <g id="room">
    <rect class="room" x="10" y="10" width="80" height="80"/>
  </g>
</svg>
