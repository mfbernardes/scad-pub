<?xml version="1.0" encoding="UTF-8"?>
<!-- Corner case B20: a filled shape plus a <text> element carrying a word.
     OpenSCAD import() silently drops <text> entirely (it only imports
     path/shape geometry), so the label will vanish from the printed part -
     the checker must flag any <text> content as dropped-on-import. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="35" r="22" fill="black"/>
  <text x="50" y="80" text-anchor="middle" font-size="16" fill="black">EXIT</text>
</svg>
