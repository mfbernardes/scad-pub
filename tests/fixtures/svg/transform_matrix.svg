<?xml version="1.0" encoding="UTF-8"?>
<!-- Corner case A9: a filled square placed and sheared entirely via a raw
     matrix() transform (shear + translate) on its enclosing <g>, rather
     than translate/rotate/scale shorthand. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g transform="matrix(1,0,0.3,1,15,15)">
    <rect x="0" y="0" width="30" height="30" fill="black"/>
  </g>
</svg>
