<?xml version="1.0" encoding="UTF-8"?>
<!-- Corner case B23: viewBox stays "0 0 100 100" but a filled shape is
     positioned partly OUTSIDE it (x spans 80 to 140), the way stray
     artboard overflow from a design tool can sneak in. The checker must
     flag geometry that extends beyond the declared canvas. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="40" cy="50" r="20" fill="black"/>
  <rect x="80" y="30" width="60" height="40" fill="black"/>
</svg>
